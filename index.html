<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pillar Wallpaper Creator</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #f8f7f4;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Topbar ── */
    #topbar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid #e0ddd8;
      background: #f8f7f4;
      flex-shrink: 0;
    }

    #topbar h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      letter-spacing: -0.01em;
    }

    #topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* ── Buttons ── */
    .btn {
      padding: 5px 13px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      line-height: 1.4;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #c0bdb8;
      color: #1a1a1a;
    }

    .btn-outline:hover {
      background: #eeebe6;
    }

    .btn-dark {
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
      color: #fff;
    }

    .btn-dark:hover {
      background: #333;
    }

    .btn-dark:disabled {
      background: #888;
      border-color: #888;
      cursor: not-allowed;
    }

    select {
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid #c0bdb8;
      background: #fff;
      cursor: pointer;
    }

    /* ── Main layout ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Panels ── */
    .panel {
      width: 200px;
      flex-shrink: 0;
      overflow-y: auto;
      background: #f8f7f4;
    }

    #left-panel  { border-right: 1px solid #e0ddd8; }
    #right-panel { border-left:  1px solid #e0ddd8; }

    .panel-section {
      padding: 12px;
      border-bottom: 1px solid #e0ddd8;
    }

    .panel-section:last-child {
      border-bottom: none;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 9px;
    }

    /* ── Ratio button group ── */
    .btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .ratio-btn {
      padding: 4px 8px;
      border-radius: 5px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      background: transparent;
      border: 1px solid #c0bdb8;
      color: #1a1a1a;
    }

    .ratio-btn.active {
      background: #1a1a1a;
      border-color: #1a1a1a;
      color: #fff;
    }

    .ratio-btn:hover:not(.active) {
      background: #eeebe6;
    }

    /* ── Color row ── */
    .color-row {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
      margin-top: 8px;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      border: 1px solid rgba(0,0,0,0.12);
      flex-shrink: 0;
    }

    .color-hex {
      font-size: 12px;
      color: #666;
      font-family: ui-monospace, monospace;
    }

    /* ── Pillar count ── */
    #pillar-count-slider {
      width: 100%;
      margin-top: 2px;
    }

    /* ── Presets ── */
    .presets-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .preset-swatch {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      overflow: hidden;
      transition: border-color 0.1s;
    }

    .preset-swatch:hover {
      border-color: #1a1a1a;
    }

    .preset-inner {
      width: 100%;
      height: 100%;
    }

    .preset-group-label {
      width: 100%;
      font-size: 10px;
      font-weight: 600;
      color: #bbb;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .preset-group-label:first-child {
      margin-top: 0;
    }

    /* ── Canvas area ── */
    #canvas-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #e8e5e0;
      overflow: hidden;
      padding: 20px;
    }

    #preview-canvas {
      display: block;
      border-radius: 4px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.22);
      cursor: crosshair;
    }

    #canvas-label {
      margin-top: 10px;
      font-size: 11px;
      color: #999;
    }

    /* ── Pillar swatches grid ── */
    .pillars-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .pillar-swatch-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      cursor: pointer;
    }

    .pillar-swatch-item .color-swatch {
      width: 28px;
      height: 28px;
      transition: transform 0.1s;
    }

    .pillar-swatch-item:hover .color-swatch {
      transform: scale(1.1);
    }

    .pillar-num {
      font-size: 10px;
      color: #aaa;
    }

    /* ── Shape sliders ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 9px;
      margin-top: 8px;
    }

    .slider-row:last-child {
      margin-bottom: 0;
    }

    .slider-label {
      width: 70px;
      font-size: 12px;
      color: #666;
      flex-shrink: 0;
    }

    .slider-row input[type="range"] {
      flex: 1;
      min-width: 0;
    }

    .slider-value {
      width: 26px;
      font-size: 12px;
      color: #666;
      text-align: right;
      flex-shrink: 0;
      font-family: ui-monospace, monospace;
    }

    /* ── Hidden inputs ── */
    input[type="color"],
    input[type="file"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 0;
      height: 0;
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top: 2px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ── Mobile tab bar (hidden on desktop) ── */
    #mobile-tabs {
      display: none;
    }

    @media (max-width: 768px) {
      body {
        height: 100dvh;
        overflow: hidden;
      }

      #import-config-btn,
      #export-config-btn {
        display: none;
      }

      #topbar h1 {
        font-size: 13px;
      }

      .btn {
        padding: 8px 14px;
        font-size: 13px;
      }

      #main {
        flex-direction: column;
        overflow: hidden;
      }

      #canvas-area {
        flex: 0 0 auto;
        height: 38vh;
        padding: 10px;
        order: 1;
      }

      #canvas-label {
        display: none;
      }

      #mobile-tabs {
        display: flex;
        order: 2;
        flex-shrink: 0;
        border-top: 1px solid #e0ddd8;
        border-bottom: 1px solid #e0ddd8;
        background: #f8f7f4;
      }

      .mobile-tab {
        flex: 1;
        padding: 10px 0;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        background: transparent;
        border: none;
        color: #999;
        cursor: pointer;
        border-bottom: 2px solid transparent;
      }

      .mobile-tab.active {
        color: #1a1a1a;
        border-bottom-color: #1a1a1a;
      }

      .panel {
        display: none;
        order: 3;
        width: 100%;
        flex: 1;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }

      .panel.mobile-active {
        display: block;
      }

      .ratio-btn {
        padding: 8px 12px;
        font-size: 13px;
      }

      .color-swatch {
        width: 36px;
        height: 36px;
      }

      .pillar-swatch-item .color-swatch {
        width: 36px;
        height: 36px;
      }

      .preset-swatch {
        width: 44px;
        height: 44px;
      }

      input[type="range"] {
        height: 28px;
        cursor: pointer;
      }

      .slider-label {
        width: 64px;
        font-size: 13px;
      }

      .panel-section {
        padding: 14px 16px;
      }
    }
  </style>
</head>
<body>

<!-- Topbar -->
<div id="topbar">
  <h1>Pillar Wallpaper Creator</h1>
  <div id="topbar-actions">
    <button class="btn btn-outline" id="undo-btn" disabled>Undo</button>
    <button class="btn btn-outline" id="redo-btn" disabled>Redo</button>
    <button class="btn btn-outline" id="reset-btn">Reset</button>
    <button class="btn btn-outline" id="save-project-btn">Save</button>
    <button class="btn btn-outline" id="load-project-btn">Load</button>
    <button class="btn btn-outline" id="share-btn">Share</button>
    <button class="btn btn-outline" id="import-config-btn">Import</button>
    <button class="btn btn-outline" id="export-config-btn">Export Config</button>
    <select id="export-resolution">
      <option value="1920x1080">1080p</option>
      <option value="3840x2160">4K</option>
      <option value="7680x4320" selected>8K</option>
    </select>
    <select id="export-format">
      <option value="png" selected>PNG</option>
      <option value="jpg">JPG</option>
      <option value="svg">SVG</option>
    </select>
    <button class="btn btn-outline" id="fullscreen-btn">Fullscreen</button>
    <button class="btn btn-dark" id="export-btn">Export</button>
  </div>
</div>

<input type="file" id="import-config-input" accept=".json">
<label id="color-pick-trigger" aria-hidden="true" style="position:absolute;width:0;height:0;overflow:hidden;"></label>

<!-- Main -->
<div id="main">

  <!-- Left Panel -->
  <div class="panel" id="left-panel">

    <div class="panel-section">
      <div class="section-label">Canvas Ratio</div>
      <div class="btn-group" id="ratio-group">
        <button class="ratio-btn active" data-ratio="16:9">16:9</button>
        <button class="ratio-btn" data-ratio="4:3">4:3</button>
        <button class="ratio-btn" data-ratio="1:1">1:1</button>
        <button class="ratio-btn" data-ratio="21:9">21:9</button>
        <button class="ratio-btn" data-ratio="9:16">9:16</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Background</div>
      <div class="btn-group" id="bg-type-group">
        <button class="ratio-btn active" id="bg-solid-btn">Solid</button>
        <button class="ratio-btn" id="bg-gradient-btn">Gradient</button>
      </div>
      <div id="bg-solid-controls">
        <label class="color-row" id="bg-color-row" for="bg-color-input">
          <div class="color-swatch" id="bg-swatch"></div>
          <span class="color-hex" id="bg-hex">#F2EDDF</span>
        </label>
        <input type="color" id="bg-color-input" value="#F2EDDF">
      </div>
      <div id="bg-gradient-controls" style="display:none;">
        <label class="color-row" for="bg-gradient-color1-input">
          <div class="color-swatch" id="bg-gradient-swatch1"></div>
          <span class="color-hex" id="bg-gradient-hex1">#F2EDDF</span>
        </label>
        <input type="color" id="bg-gradient-color1-input" value="#F2EDDF">
        <label class="color-row" for="bg-gradient-color2-input">
          <div class="color-swatch" id="bg-gradient-swatch2"></div>
          <span class="color-hex" id="bg-gradient-hex2">#FFFFFF</span>
        </label>
        <input type="color" id="bg-gradient-color2-input" value="#FFFFFF">
        <select id="bg-gradient-direction" style="width:100%;margin-top:8px;">
          <option value="to bottom">Vertical</option>
          <option value="to right">Horizontal</option>
          <option value="to bottom right">Diagonal</option>
        </select>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Pillar Count &mdash; <span id="pillar-count-label">10</span></div>
      <input type="range" id="pillar-count-slider" min="3" max="12" step="1" value="10">
    </div>

    <div class="panel-section">
      <div class="section-label">Stack Order</div>
      <div class="btn-group">
        <button class="ratio-btn" id="stack-left-btn">Left on top</button>
        <button class="ratio-btn active" id="stack-right-btn">Right on top</button>
      </div>
      <button class="btn btn-outline" id="reverse-order-btn" style="margin-top:8px;width:100%;">Reverse Colors</button>
    </div>

    <div class="panel-section">
      <div class="section-label">Orientation</div>
      <div class="btn-group">
        <button class="ratio-btn active" id="flip-off-btn">Horizontal</button>
        <button class="ratio-btn" id="flip-on-btn">Vertical</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Presets</div>
      <div class="presets-grid" id="presets-grid"></div>
      <button class="btn btn-outline" id="randomize-btn" style="margin-top:10px;width:100%;">Randomize</button>
    </div>

  </div>

  <!-- Canvas Area -->
  <div id="canvas-area">
    <canvas id="preview-canvas"></canvas>
    <div id="canvas-label">Preview — exports at 7680 × 4320 px</div>
  </div>

  <!-- Mobile tab bar -->
  <div id="mobile-tabs">
    <button class="mobile-tab active" data-target="left-panel">Settings</button>
    <button class="mobile-tab" data-target="right-panel">Colors &amp; Shape</button>
  </div>

  <!-- Right Panel -->
  <div class="panel" id="right-panel">

    <div class="panel-section">
      <div class="section-label">Pillar Colors</div>
      <div class="pillars-grid" id="pillars-grid"></div>
      <div id="pillar-color-inputs"></div>
    </div>

    <div class="panel-section">
      <div class="section-label">Shape</div>
      <select id="shape-select" style="width:100%;margin-bottom:8px;">
        <option value="rounded-rect" selected>Rounded Rectangle</option>
        <option value="circle">Circle</option>
        <option value="triangle">Triangle</option>
      </select>

      <div class="slider-row" id="roundness-row">
        <span class="slider-label">Roundness</span>
        <input type="range" id="roundness-slider" min="0" max="100" step="1" value="100">
        <span class="slider-value" id="roundness-value">100</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Width</span>
        <input type="range" id="width-slider" min="10" max="80" step="1" value="15">
        <span class="slider-value" id="width-value">15</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Height</span>
        <input type="range" id="height-slider" min="40" max="100" step="1" value="70">
        <span class="slider-value" id="height-value">70</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Overlap</span>
        <input type="range" id="overlap-slider" min="0" max="80" step="1" value="55">
        <span class="slider-value" id="overlap-value">55</span>
      </div>

      <div class="slider-row">
        <span class="slider-label">Shade</span>
        <input type="range" id="shade-slider" min="0" max="100" step="1" value="0">
        <span class="slider-value" id="shade-value">0</span>
      </div>

    </div>

  </div>

</div>

      { name: 'Peach',   bg: '#FFF8F3', pillars: ['#FFF0E8','#FFE6D8','#FFDCC8','#FFD2B8','#FFC8A8','#F5BD95','#EBB280','#E1A76C','#D79C58','#CD9144'] },

const DEFAULTS = {
  ratio: '16:9',
  bgColor: '#F2EDDF',
  bgGradient: { enabled: false, colors: ['#F2EDDF', '#FFFFFF'], direction: 'to bottom' },
  pillarCount: 10,
  pillarColors: ['#000000','#111111','#222222','#333333','#444444','#555555','#666666','#777777','#888888','#999999'],
  shape: 'rounded-rect',
  roundness: 100,

  overlapPct: 55,
  shadePct: 0,
  stackReversed: false,
  flipped: false,
};

// ── State ──────────────────────────────────────────────────────────────────────

let history = [];
let historyIndex = -1;

let state = {
  ratio: DEFAULTS.ratio,
  bgColor: DEFAULTS.bgColor,
  bgGradient: { ...DEFAULTS.bgGradient, colors: [...DEFAULTS.bgGradient.colors] },
  pillarCount: DEFAULTS.pillarCount,
  pillarColors: [...DEFAULTS.pillarColors],
  shape: DEFAULTS.shape,
  roundness: DEFAULTS.roundness,
  pillarWidthPct: DEFAULTS.pillarWidthPct,
  pillarHeightPct: DEFAULTS.pillarHeightPct,
  overlapPct: DEFAULTS.overlapPct,
  shadePct: DEFAULTS.shadePct,
  stackReversed: DEFAULTS.stackReversed,
  flipped: DEFAULTS.flipped,
};

// ── DOM refs ───────────────────────────────────────────────────────────────────

const canvas      = document.getElementById('preview-canvas');
const ctx         = canvas.getContext('2d');
const canvasLabel = document.getElementById('canvas-label');
const canvasArea  = document.getElementById('canvas-area');
const pillarsGrid = document.getElementById('pillars-grid');
const pillarColorInputsEl = document.getElementById('pillar-color-inputs');

// ── Undo/Redo ──────────────────────────────────────────────────────────────────

let saveTimeout;
function saveState() {
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    const stateCopy = JSON.parse(JSON.stringify(state));
    history = history.slice(0, historyIndex + 1);
    history.push(stateCopy);
    if (history.length > 50) history.shift();
    historyIndex = history.length - 1;
    updateUndoRedoButtons();
  }, 500);
}

function undo() {
  if (historyIndex > 0) {
    historyIndex--;
    applyStateSnapshot(history[historyIndex]);
  }
}

function redo() {
  if (historyIndex < history.length - 1) {
    historyIndex++;
    applyStateSnapshot(history[historyIndex]);
  }
}

function applyStateSnapshot(snapshot) {
  Object.assign(state, JSON.parse(JSON.stringify(snapshot)));
  syncUI();
  buildPillarSwatches();
  redraw();
  updateUndoRedoButtons();
}

function updateUndoRedoButtons() {
  document.getElementById('undo-btn').disabled = historyIndex <= 0;
  document.getElementById('redo-btn').disabled = historyIndex >= history.length - 1;
}

// ── Helpers ────────────────────────────────────────────────────────────────────

function ratioAspect(ratio) {
  const [a, b] = ratio.split(':').map(Number);
  return a / b;
}

// Hex color → { r, g, b }
function hexToRgb(hex) {
  const n = parseInt(hex.replace('#', ''), 16);
  return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
}

// Apply a shade (darken) factor 0‒1 to a hex color
function shadeColor(hex, factor) {
  const { r, g, b } = hexToRgb(hex);
  const f = 1 - factor;
  const toHex = (v) => Math.round(v * f).toString(16).padStart(2, '0');
  return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
}

// Draw a rounded rectangle path
function roundRectPath(c, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  c.beginPath();
  c.moveTo(x + r, y);
  c.lineTo(x + w - r, y);
  c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r);
  c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h);
  c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r);
  c.quadraticCurveTo(x, y, x + r, y);
  c.closePath();
}

// Draw a single pillar shape on canvas context c
function drawShape(c, x, y, w, h, shape, rx) {
  c.beginPath();
  switch (shape) {
    case 'rounded-rect':
      roundRectPath(c, x, y, w, h, rx);
      break;
    case 'circle': {
      const cx = x + w / 2;
      const cy = y + h / 2;
      const radius = Math.min(w, h) / 2;
      c.arc(cx, cy, radius, 0, 2 * Math.PI);
      break;
    }
    case 'triangle':
      c.moveTo(x + w / 2, y);
      c.lineTo(x, y + h);
      c.lineTo(x + w, y + h);
      c.closePath();
      break;
    default:
      roundRectPath(c, x, y, w, h, rx);
  }
  c.fill();
}

// ── Canvas sizing ──────────────────────────────────────────────────────────────

function fitCanvas() {
  const areaW = Math.max(100, canvasArea.clientWidth - 40);
  const areaH = Math.max(100, canvasArea.clientHeight - 40);
  const aspect = ratioAspect(state.ratio);

  let w = areaW;
  let h = w / aspect;
  if (h > areaH) {
    h = areaH;
    w = h * aspect;
  }

  canvas.width  = Math.round(w);
  canvas.height = Math.round(h);
  canvas.style.width  = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';

  const dims = RATIO_DIMS[state.ratio];
  canvasLabel.textContent = `Preview — exports at ${dims.w} \u00d7 ${dims.h} px`;
}

// ── Core Draw Function ─────────────────────────────────────────────────────────

function draw(c, cw, ch) {
  const {
    bgColor, bgGradient,
    pillarCount, pillarColors,
    shape, roundness,
    pillarWidthPct, pillarHeightPct,
    overlapPct, shadePct,
    stackReversed, flipped,
  } = state;

  // ── Background ──
  if (bgGradient.enabled) {
    let grad;
    const dir = bgGradient.direction;
    if (dir === 'to right') {
      grad = c.createLinearGradient(0, 0, cw, 0);
    } else if (dir === 'to bottom right') {
      grad = c.createLinearGradient(0, 0, cw, ch);
    } else {
      // to bottom (default)
      grad = c.createLinearGradient(0, 0, 0, ch);
    }
    grad.addColorStop(0, bgGradient.colors[0]);
    grad.addColorStop(1, bgGradient.colors[1]);
    c.fillStyle = grad;
  } else {
    c.fillStyle = bgColor;
  }
  c.fillRect(0, 0, cw, ch);

  // ── Pillar geometry ──
  const pillarW = flipped ? ch * pillarWidthPct / 100 : cw * pillarWidthPct / 100;
  const pillarH = flipped ? cw * pillarHeightPct / 100 : ch * pillarHeightPct / 100;
  const step    = pillarW * (1 - overlapPct / 100);
  const totalW  = pillarW + step * (pillarCount - 1);
  const rx      = (pillarW / 2) * (roundness / 100);
  const shadeFactor = shadePct / 100;

  // Draw order: stackReversed = left on top (draw right first), else right on top (draw left first)
  const drawOrder = stackReversed
    ? Array.from({ length: pillarCount }, (_, k) => pillarCount - 1 - k)
    : Array.from({ length: pillarCount }, (_, k) => k);

  if (flipped) {
    const startY = (ch - totalW) / 2;
    const startX = (cw - pillarH) / 2;

    for (let di = 0; di < drawOrder.length; di++) {
      const i = drawOrder[di];
      const y = startY + i * step;
      let color = pillarColors[i] !== undefined ? pillarColors[i] : pillarColors[pillarColors.length - 1];

      // Apply progressive shade: pillars drawn later (on top visually) get darker
      if (shadeFactor > 0) {
        const progress = stackReversed ? (pillarCount - 1 - i) / (pillarCount - 1) : i / (pillarCount - 1);
        color = shadeColor(color, shadeFactor * progress * 0.6);
      }

      c.fillStyle = color;
      drawShape(c, startX, y, pillarH, pillarW, shape, rx);
    }
  } else {
    const startX = (cw - totalW) / 2;
    const startY = (ch - pillarH) / 2;

    for (let di = 0; di < drawOrder.length; di++) {
      const i = drawOrder[di];
      const x = startX + i * step;
      let color = pillarColors[i] !== undefined ? pillarColors[i] : pillarColors[pillarColors.length - 1];

      // Apply progressive shade
      if (shadeFactor > 0) {
        const progress = stackReversed ? (pillarCount - 1 - i) / (pillarCount - 1) : i / (pillarCount - 1);
        color = shadeColor(color, shadeFactor * progress * 0.6);
      }

      c.fillStyle = color;
      drawShape(c, x, startY, pillarW, pillarH, shape, rx);
    }
  }
}

function redraw() {
  fitCanvas();
  draw(ctx, canvas.width, canvas.height);
  saveState();
}

// ── Hit Testing ────────────────────────────────────────────────────────────────

function hitTestCanvas(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const mx = (clientX - rect.left) * (canvas.width / rect.width);
  const my = (clientY - rect.top)  * (canvas.height / rect.height);

  const cw = canvas.width;
  const ch = canvas.height;
  const { pillarCount, pillarWidthPct, pillarHeightPct, overlapPct, flipped } = state;

  const pillarW = flipped ? ch * pillarWidthPct / 100 : cw * pillarWidthPct / 100;
  const pillarH = flipped ? cw * pillarHeightPct / 100 : ch * pillarHeightPct / 100;
  const step    = pillarW * (1 - overlapPct / 100);
  const totalW  = pillarW + step * (pillarCount - 1);

  // Test in reverse draw order so topmost pillar wins
  const hitOrder = state.stackReversed
    ? Array.from({ length: pillarCount }, (_, k) => pillarCount - 1 - k)
    : Array.from({ length: pillarCount }, (_, k) => k);

  if (flipped) {
    const startY = (ch - totalW) / 2;
    const startX = (cw - pillarH) / 2;
    for (const i of hitOrder) {
      const y = startY + i * step;
      if (mx >= startX && mx <= startX + pillarH && my >= y && my <= y + pillarW) {
        return i;
      }
    }
  } else {
    const startX = (cw - totalW) / 2;
    const startY = (ch - pillarH) / 2;
    for (const i of hitOrder) {
      const x = startX + i * step;
      if (mx >= x && mx <= x + pillarW && my >= startY && my <= startY + pillarH) {
        return i;
      }
    }
  }
  return -1;
}

// ── Canvas interaction ─────────────────────────────────────────────────────────

let isDraggingPillar = false;
let draggedPillarIndex = -1;

canvas.addEventListener('mousedown', (e) => {
  const pillarIndex = hitTestCanvas(e.clientX, e.clientY);
  if (pillarIndex === -1) return;

  if (e.shiftKey) {
    isDraggingPillar = true;
    draggedPillarIndex = pillarIndex;
    canvas.style.cursor = 'grabbing';
    e.preventDefault();
  } else {
    const trigger = document.getElementById('color-pick-trigger');
    trigger.htmlFor = `pillar-input-${pillarIndex}`;
    trigger.click();
  }
});

document.addEventListener('mousemove', (e) => {
  if (!isDraggingPillar) return;

  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (canvas.width / rect.width);
  const my = (e.clientY - rect.top)  * (canvas.height / rect.height);

  const { pillarCount, pillarWidthPct, overlapPct, flipped } = state;
  const pillarW = flipped ? canvas.height * pillarWidthPct / 100 : canvas.width * pillarWidthPct / 100;
  const step    = pillarW * (1 - overlapPct / 100);
  const totalW  = pillarW + step * (pillarCount - 1);

  let newIndex;
  if (flipped) {
    const startY = (canvas.height - totalW) / 2;
    newIndex = Math.round((my - startY) / step);
  } else {
    const startX = (canvas.width - totalW) / 2;
    newIndex = Math.round((mx - startX) / step);
  }
  newIndex = Math.max(0, Math.min(pillarCount - 1, newIndex));

  if (newIndex !== draggedPillarIndex) {
    [state.pillarColors[draggedPillarIndex], state.pillarColors[newIndex]] =
      [state.pillarColors[newIndex], state.pillarColors[draggedPillarIndex]];
    draggedPillarIndex = newIndex;
    buildPillarSwatches();
    redraw();
  }
});

document.addEventListener('mouseup', () => {
  if (isDraggingPillar) {
    isDraggingPillar = false;
    canvas.style.cursor = 'crosshair';
  }
});

canvas.addEventListener('touchend', (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  const pillarIndex = hitTestCanvas(t.clientX, t.clientY);
  if (pillarIndex !== -1) {
    const trigger = document.getElementById('color-pick-trigger');
    trigger.htmlFor = `pillar-input-${pillarIndex}`;
    trigger.click();
  }
});

canvas.style.cursor = 'crosshair';

// ── Build pillar swatches ──────────────────────────────────────────────────────

function buildPillarSwatches() {
  pillarsGrid.innerHTML = '';
  pillarColorInputsEl.innerHTML = '';

  for (let i = 0; i < state.pillarCount; i++) {
    const color = state.pillarColors[i] !== undefined
      ? state.pillarColors[i]
      : state.pillarColors[state.pillarColors.length - 1];

    const item = document.createElement('label');
    item.className = 'pillar-swatch-item';
    item.title = `Pillar ${i + 1}`;
    item.htmlFor = `pillar-input-${i}`;

    const swatch = document.createElement('div');
    swatch.className = 'color-swatch';
    swatch.id = `pillar-swatch-${i}`;
    swatch.style.background = color;

    const num = document.createElement('span');
    num.className   = 'pillar-num';
    num.textContent = i + 1;

    item.appendChild(swatch);
    item.appendChild(num);
    pillarsGrid.appendChild(item);

    const input = document.createElement('input');
    input.type  = 'color';
    input.id    = `pillar-input-${i}`;
    input.value = color;
    input.addEventListener('input', (ev) => {
      state.pillarColors[i] = ev.target.value;
      document.getElementById(`pillar-swatch-${i}`).style.background = ev.target.value;
      redraw();
    });
    pillarColorInputsEl.appendChild(input);
  }
}

// ── Build preset swatches ──────────────────────────────────────────────────────

function makePresetSwatch(preset) {
  const wrap = document.createElement('div');
  wrap.className = 'preset-swatch';
  wrap.title = preset.name;

  const inner = document.createElement('div');
  inner.className = 'preset-inner';
  const cols = preset.pillars.slice(0, 5);
  const stops = cols.map((c, i, arr) => {
    const p0 = (i / arr.length * 100).toFixed(1);
    const p1 = ((i + 1) / arr.length * 100).toFixed(1);
    return `${c} ${p0}%, ${c} ${p1}%`;
  }).join(', ');
  inner.style.background = `linear-gradient(to right, ${stops})`;

  wrap.appendChild(inner);
  wrap.addEventListener('click', () => applyPreset(preset));
  return wrap;
}

function buildPresets() {
  const grid = document.getElementById('presets-grid');
  grid.innerHTML = '';

  PRESET_GROUPS.forEach((group) => {
    const lbl = document.createElement('div');
    lbl.className   = 'preset-group-label';
    lbl.textContent = group.label;
    grid.appendChild(lbl);

    group.presets.forEach((preset) => {
      grid.appendChild(makePresetSwatch(preset));
    });
  });
}

function applyPreset(preset) {
  state.bgColor = preset.bg;
  state.bgGradient.enabled = false;
  state.pillarColors = [...preset.pillars];
  state.pillarCount  = preset.pillars.length;
  syncUI();
  buildPillarSwatches();
  redraw();
}

// ── Reset ──────────────────────────────────────────────────────────────────────

function resetAll() {
  state.ratio           = DEFAULTS.ratio;
  state.bgColor         = DEFAULTS.bgColor;
  state.bgGradient      = { ...DEFAULTS.bgGradient, colors: [...DEFAULTS.bgGradient.colors] };
  state.pillarCount     = DEFAULTS.pillarCount;
  state.pillarColors    = [...DEFAULTS.pillarColors];
  state.shape           = DEFAULTS.shape;

  state.pillarWidthPct  = DEFAULTS.pillarWidthPct;

// ── Randomize ──────────────────────────────────────────────────────────────────

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = (n) => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  };
  return `#${f(0)}${f(8)}${f(4)}`.toUpperCase();
}

function generateThemedPalette(count) {
  const strategies = ['monochrome', 'analogous', 'complementary', 'triadic', 'split'];
  const strategy   = strategies[Math.floor(Math.random() * strategies.length)];
  const baseHue    = Math.random() * 360;
  const baseSat    = 50 + Math.random() * 40;
  const isDark     = Math.random() < 0.35;
  const colors     = [];

  for (let i = 0; i < count; i++) {
    const t = i / (count - 1);
    let hue, sat, lit;
    switch (strategy) {
      case 'monochrome':
        hue = baseHue + (Math.random() * 10 - 5);
        sat = baseSat + (Math.random() * 10 - 5);
        lit = isDark ? 70 - t * 60 : 80 - t * 55;
        break;
      case 'analogous':
        hue = baseHue + t * 40 - 20;
        sat = baseSat + (Math.random() * 10 - 5);
        lit = isDark ? 65 - t * 50 : 78 - t * 50;
        break;
      case 'complementary':
        hue = baseHue + (i < count / 2 ? t * 15 : 180 + t * 15);
        sat = baseSat;
        lit = isDark ? 65 - t * 50 : 78 - t * 50;
        break;
      case 'triadic':
        hue = baseHue + (i % 3) * 120 + (Math.random() * 12 - 6);
        sat = baseSat;
        lit = isDark ? 65 - t * 45 : 80 - t * 50;
        break;
      case 'split':
        hue = baseHue + (i % 2 === 0 ? -30 : 30) + (Math.random() * 10 - 5);
        sat = baseSat + (Math.random() * 10 - 5);
        lit = isDark ? 68 - t * 55 : 80 - t * 55;
        break;
    }
    sat = Math.max(20, Math.min(100, sat));
    lit = Math.max(5, Math.min(95, lit));
    colors.push(hslToHex(hue, sat, lit));
  }

  const bg = isDark
    ? hslToHex(baseHue, 5  + Math.random() * 10, 2 + Math.random() * 4)
    : hslToHex(baseHue, 10 + Math.random() * 20, 94 + Math.random() * 5);

  return { bg, colors };
}

document.getElementById('randomize-btn').addEventListener('click', () => {
  const { bg, colors } = generateThemedPalette(state.pillarCount);
  state.bgColor = bg;
  state.bgGradient.enabled = Math.random() < 0.3;
  if (state.bgGradient.enabled) {
    state.bgGradient.colors = [bg, hslToHex(Math.random() * 360, 20 + Math.random() * 30, 80 + Math.random() * 15)];
  }
  state.pillarColors = colors;
  syncUI();
  buildPillarSwatches();
  redraw();
});

document.getElementById('reverse-order-btn').addEventListener('click', () => {
  state.pillarColors.reverse();
  buildPillarSwatches();
  redraw();
});

// ── SVG Generation ─────────────────────────────────────────────────────────────

function generateSVG(w, h) {
  const {
    bgColor, bgGradient,
    pillarCount, pillarColors,
    shape, roundness,
    pillarWidthPct, pillarHeightPct,
    overlapPct, flipped, stackReversed,
  } = state;

  let defs = '';
  let bgFill = bgColor;

  if (bgGradient.enabled) {
    const dir = bgGradient.direction;
    let x1 = '0%', y1 = '0%', x2 = '0%', y2 = '0%';
    if (dir === 'to right')         { x2 = '100%'; }
    else if (dir === 'to bottom')   { y2 = '100%'; }
    else if (dir === 'to bottom right') { x2 = '100%'; y2 = '100%'; }
    defs = `<defs><linearGradient id="bg" x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}">
      <stop offset="0%" stop-color="${bgGradient.colors[0]}" />
      <stop offset="100%" stop-color="${bgGradient.colors[1]}" />
    </linearGradient></defs>`;
    bgFill = 'url(#bg)';
  }

  let svg = `<svg width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">${defs}`;
  svg += `<rect width="${w}" height="${h}" fill="${bgFill}" />`;

  const pillarW = flipped ? h * pillarWidthPct / 100 : w * pillarWidthPct / 100;
  const pillarH = flipped ? w * pillarHeightPct / 100 : h * pillarHeightPct / 100;
  const step    = pillarW * (1 - overlapPct / 100);
  const totalW  = pillarW + step * (pillarCount - 1);
  const rx      = (pillarW / 2) * (roundness / 100);

  const drawOrder = stackReversed
    ? Array.from({ length: pillarCount }, (_, k) => pillarCount - 1 - k)
    : Array.from({ length: pillarCount }, (_, k) => k);

  if (flipped) {
    const startY = (h - totalW) / 2;
    const startX = (w - pillarH) / 2;
    for (const i of drawOrder) {
      const y = startY + i * step;
      const color = pillarColors[i] !== undefined ? pillarColors[i] : pillarColors[pillarColors.length - 1];
      if (shape === 'triangle') {
        svg += `<polygon points="${startX + pillarH / 2},${y} ${startX},${y + pillarW} ${startX + pillarH},${y + pillarW}" fill="${color}" />`;
      } else if (shape === 'circle') {
        const cx = startX + pillarH / 2;
        const cy = y + pillarW / 2;
        const r2 = Math.min(pillarH, pillarW) / 2;
        svg += `<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${color}" />`;
      } else {
        svg += `<rect x="${startX}" y="${y}" width="${pillarH}" height="${pillarW}" fill="${color}" rx="${rx}" />`;
      }
    }
  } else {
    const startX = (w - totalW) / 2;
    const startY = (h - pillarH) / 2;
    for (const i of drawOrder) {
      const x = startX + i * step;
      const color = pillarColors[i] !== undefined ? pillarColors[i] : pillarColors[pillarColors.length - 1];
      if (shape === 'triangle') {
        svg += `<polygon points="${x + pillarW / 2},${startY} ${x},${startY + pillarH} ${x + pillarW},${startY + pillarH}" fill="${color}" />`;
      } else if (shape === 'circle') {
        const cx = x + pillarW / 2;
        const cy = startY + pillarH / 2;
        const r2 = Math.min(pillarW, pillarH) / 2;
        svg += `<circle cx="${cx}" cy="${cy}" r="${r2}" fill="${color}" />`;
      } else {
        svg += `<rect x="${x}" y="${startY}" width="${pillarW}" height="${pillarH}" fill="${color}" rx="${rx}" />`;
      }
    }
  }

  svg += '</svg>';
  return svg;
}

// ── Export ─────────────────────────────────────────────────────────────────────

function getExportDims() {
  const res = document.getElementById('export-resolution').value;
  const [w, h] = res.split('x').map(Number);
  return { w, h };
}

function showExportSpinner(show) {
  const btn = document.getElementById('export-btn');
  const existing = btn.querySelector('.spinner');
  if (show) {
    if (!existing) {
      const spinner = document.createElement('span');
      spinner.className = 'spinner';
      btn.appendChild(spinner);
    }
    btn.disabled = true;
  } else {
    if (existing) existing.remove();
    btn.disabled = false;
  }
}

document.getElementById('export-btn').addEventListener('click', () => {
  const btn = document.getElementById('export-btn');
  const origText = btn.textContent;
  btn.textContent = 'Exporting…';
  showExportSpinner(true);

  const format = document.getElementById('export-format').value;
  const dims   = getExportDims();

  setTimeout(() => {
    if (format === 'svg') {
      const svg  = generateSVG(dims.w, dims.h);
      const blob = new Blob([svg], { type: 'image/svg+xml' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href = url; a.download = `wallpaper-${dims.w}x${dims.h}.svg`;
      a.click();
      URL.revokeObjectURL(url);
      btn.textContent = origText;
      showExportSpinner(false);
    } else {
      const offscreen    = document.createElement('canvas');
      offscreen.width    = dims.w;
      offscreen.height   = dims.h;
      const offCtx       = offscreen.getContext('2d');
      draw(offCtx, dims.w, dims.h);

      const mime = format === 'jpg' ? 'image/jpeg' : 'image/png';
      offscreen.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a   = document.createElement('a');
        a.href = url; a.download = `wallpaper-${dims.w}x${dims.h}.${format}`;
        a.click();
        URL.revokeObjectURL(url);
        btn.textContent = origText;
        showExportSpinner(false);
      }, mime, format === 'jpg' ? 0.95 : undefined);
    }
  }, 16);
});

// ── Fullscreen ─────────────────────────────────────────────────────────────────

document.getElementById('fullscreen-btn').addEventListener('click', () => {
  if (canvasArea.requestFullscreen) canvasArea.requestFullscreen();
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement) redraw();
  else redraw();
});

// ── Project Save / Load ────────────────────────────────────────────────────────

function stateSnapshot() {
  return {
    ratio: state.ratio,
    bgColor: state.bgColor,
    bgGradient: { ...state.bgGradient, colors: [...state.bgGradient.colors] },
    pillarCount: state.pillarCount,
    pillarColors: [...state.pillarColors],
    shape: state.shape,
    roundness: state.roundness,
    pillarWidthPct: state.pillarWidthPct,
    pillarHeightPct: state.pillarHeightPct,
    overlapPct: state.overlapPct,
    shadePct: state.shadePct,
    stackReversed: state.stackReversed,
    flipped: state.flipped,
  };
}

document.getElementById('save-project-btn').addEventListener('click', () => {
  localStorage.setItem('wallpaper-project', JSON.stringify(stateSnapshot()));
  alert('Project saved to local storage.');
});

document.getElementById('load-project-btn').addEventListener('click', () => {
  const saved = localStorage.getItem('wallpaper-project');
  if (!saved) { alert('No saved project found.'); return; }
  try {
    const cfg = JSON.parse(saved);
    Object.assign(state, cfg);
    syncUI();
    buildPillarSwatches();
    redraw();
    alert('Project loaded.');
  } catch {
    alert('Failed to load project.');
  }
});

document.getElementById('share-btn').addEventListener('click', () => {
  const encoded = btoa(JSON.stringify(stateSnapshot()));
  const url = window.location.origin + window.location.pathname + '?config=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    alert('Shareable link copied to clipboard.');
  }).catch(() => {
    prompt('Copy this link:', url);
  });
});

// ── Export / Import Config ─────────────────────────────────────────────────────

document.getElementById('export-config-btn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(stateSnapshot(), null, 2)], { type: 'application/json' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'wallpaper-config.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('import-config-btn').addEventListener('click', () => {
  document.getElementById('import-config-input').click();
});

document.getElementById('import-config-input').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const cfg = JSON.parse(ev.target.result);
      if (cfg.ratio && RATIO_DIMS[cfg.ratio])                    state.ratio           = cfg.ratio;
      if (typeof cfg.bgColor === 'string')                       state.bgColor         = cfg.bgColor;
      if (cfg.bgGradient && typeof cfg.bgGradient === 'object')  state.bgGradient      = { ...cfg.bgGradient, colors: [...(cfg.bgGradient.colors || ['#F2EDDF','#FFFFFF'])] };
      if (typeof cfg.pillarCount === 'number')                   state.pillarCount     = cfg.pillarCount;
      if (Array.isArray(cfg.pillarColors))                       state.pillarColors    = [...cfg.pillarColors];
      if (typeof cfg.shape === 'string')                         state.shape           = cfg.shape;
      if (typeof cfg.roundness === 'number')                     state.roundness       = cfg.roundness;
      if (typeof cfg.pillarWidthPct === 'number')                state.pillarWidthPct  = cfg.pillarWidthPct;
      if (typeof cfg.pillarHeightPct === 'number')               state.pillarHeightPct = cfg.pillarHeightPct;
      if (typeof cfg.overlapPct === 'number')                    state.overlapPct      = cfg.overlapPct;
      if (typeof cfg.shadePct === 'number')                      state.shadePct        = cfg.shadePct;
      if (typeof cfg.stackReversed === 'boolean')                state.stackReversed   = cfg.stackReversed;
      if (typeof cfg.flipped === 'boolean')                      state.flipped         = cfg.flipped;
      syncUI();
      buildPillarSwatches();
      redraw();
    } catch {
      alert('Could not load configuration — invalid JSON file.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});

// ── Undo / Redo buttons ────────────────────────────────────────────────────────

document.getElementById('undo-btn').addEventListener('click', undo);
document.getElementById('redo-btn').addEventListener('click', redo);

// ── Keyboard shortcuts ─────────────────────────────────────────────────────────

document.addEventListener('keydown', (e) => {
  if (e.ctrlKey || e.metaKey) {
    switch (e.key) {
      case 'z':
        e.preventDefault();
        e.shiftKey ? redo() : undo();
        break;
      case 'y':
        e.preventDefault();
        redo();
        break;
      case 's':
        e.preventDefault();
        document.getElementById('export-config-btn').click();
        break;
      case 'e':
        e.preventDefault();
        document.getElementById('export-btn').click();
        break;
      case 'r':
        e.preventDefault();
        resetAll();
        break;
    }
  } else if (e.key === 'Escape' && document.fullscreenElement) {
    document.exitFullscreen();
  }
});

// ── Event Listeners ────────────────────────────────────────────────────────────

// Ratio
document.getElementById('ratio-group').addEventListener('click', (e) => {
  const btn = e.target.closest('.ratio-btn');
  if (!btn || !btn.dataset.ratio) return;
  state.ratio = btn.dataset.ratio;
  syncUI();
  redraw();
});

// Stack order
document.getElementById('stack-left-btn').addEventListener('click', () => {
  state.stackReversed = true;
  syncUI();
  redraw();
});
document.getElementById('stack-right-btn').addEventListener('click', () => {
  state.stackReversed = false;
  syncUI();
  redraw();
});

// Background type toggle
document.getElementById('bg-type-group').addEventListener('click', (e) => {
  const btn = e.target.closest('.ratio-btn');
  if (!btn) return;
  state.bgGradient.enabled = (btn.id === 'bg-gradient-btn');
  syncUI();
  redraw();
});

// Background solid color
document.getElementById('bg-color-input').addEventListener('input', (e) => {
  state.bgColor = e.target.value;
  document.getElementById('bg-swatch').style.background = state.bgColor;
  document.getElementById('bg-hex').textContent         = state.bgColor.toUpperCase();
  redraw();
});

// Gradient colors
document.getElementById('bg-gradient-color1-input').addEventListener('input', (e) => {
  state.bgGradient.colors[0] = e.target.value;
  document.getElementById('bg-gradient-swatch1').style.background = e.target.value;
  document.getElementById('bg-gradient-hex1').textContent = e.target.value.toUpperCase();
  redraw();
});
document.getElementById('bg-gradient-color2-input').addEventListener('input', (e) => {
  state.bgGradient.colors[1] = e.target.value;
  document.getElementById('bg-gradient-swatch2').style.background = e.target.value;
  document.getElementById('bg-gradient-hex2').textContent = e.target.value.toUpperCase();
  redraw();
});
document.getElementById('bg-gradient-direction').addEventListener('change', (e) => {
  state.bgGradient.direction = e.target.value;
  redraw();
});

// Pillar count
document.getElementById('pillar-count-slider').addEventListener('input', (e) => {
  const newCount = parseInt(e.target.value, 10);
  if (newCount > state.pillarCount) {
    const last = state.pillarColors[state.pillarColors.length - 1] || '#000000';
    for (let i = state.pillarCount; i < newCount; i++) state.pillarColors.push(last);
  } else {
    state.pillarColors = state.pillarColors.slice(0, newCount);
  }
  state.pillarCount = newCount;
  document.getElementById('pillar-count-label').textContent = newCount;
  buildPillarSwatches();
  redraw();
});

// Shape select
document.getElementById('shape-select').addEventListener('change', (e) => {
  state.shape = e.target.value;
  syncUI();
  redraw();
});

// Shape sliders
document.getElementById('roundness-slider').addEventListener('input', (e) => {
  state.roundness = parseInt(e.target.value, 10);
  document.getElementById('roundness-value').textContent = state.roundness;
  redraw();
});
document.getElementById('width-slider').addEventListener('input', (e) => {
  state.pillarWidthPct = parseInt(e.target.value, 10);
  document.getElementById('width-value').textContent = state.pillarWidthPct;
  redraw();
});
document.getElementById('height-slider').addEventListener('input', (e) => {
  state.pillarHeightPct = parseInt(e.target.value, 10);
  document.getElementById('height-value').textContent = state.pillarHeightPct;
  redraw();
});
document.getElementById('overlap-slider').addEventListener('input', (e) => {
  state.overlapPct = parseInt(e.target.value, 10);
  document.getElementById('overlap-value').textContent = state.overlapPct;
  redraw();
});
document.getElementById('shade-slider').addEventListener('input', (e) => {
  state.shadePct = parseInt(e.target.value, 10);
  document.getElementById('shade-value').textContent = state.shadePct;
  redraw();
});

// Orientation / Flip
document.getElementById('flip-off-btn').addEventListener('click', () => {
  state.flipped = false;
  if (state.ratio === '9:16') state.ratio = '16:9';
  syncUI();
  redraw();
});
document.getElementById('flip-on-btn').addEventListener('click', () => {
  state.flipped = true;
  if (state.ratio === '16:9') state.ratio = '9:16';
  syncUI();
  redraw();
});

// Reset
document.getElementById('reset-btn').addEventListener('click', resetAll);

// Window resize
window.addEventListener('resize', redraw);

// ── Mobile Tabs ────────────────────────────────────────────────────────────────

(function () {
  const tabs = document.querySelectorAll('.mobile-tab');
  document.getElementById('left-panel').classList.add('mobile-active');

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('mobile-active'));
      document.getElementById(tab.dataset.target).classList.add('mobile-active');
    });
  });
}());

// ── Init ───────────────────────────────────────────────────────────────────────

buildPresets();
buildPillarSwatches();
syncUI();

// Load from URL if present
const urlParams   = new URLSearchParams(window.location.search);
const configParam = urlParams.get('config');
if (configParam) {
  try {
    const cfg = JSON.parse(atob(configParam));
    Object.assign(state, cfg);
    syncUI();
    buildPillarSwatches();
  } catch (err) {
    console.error('Failed to load config from URL', err);
  }
}

redraw();
</script>
</body>
</html>
